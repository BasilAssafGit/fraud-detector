    // ── Statistical Helper Engines ──────────────────────────────────────────────
    function sigmoid(x) {
      return 1 / (1 + Math.exp(-Math.max(-500, Math.min(500, x))));
    }

    function runModel(values) {
      const { featureCols, scalerMean, scalerStd, coef, intercept } = MODEL;
      let z = intercept;
      const contribs = [];
      featureCols.forEach((col, i) => {
        const rawVal = values[col] !== undefined ? parseFloat(values[col]) : scalerMean[i];
        const scaled = (rawVal - scalerMean[i]) / scalerStd[i];
        const c = coef[i] * scaled;
        z += c;
        contribs.push({ col, contrib: c });
      });
      const probValid = sigmoid(z);
      return {
        probValid,
        probFraud: 1 - probValid,
        isValid: probValid >= 0.5,
        contributions: contribs,
      };
    }

    function detectProblems(values) {
      const probs = [];
      Object.entries(THRESHOLDS).forEach(([key, rule]) => {
        const v = parseFloat(values[key]);
        if (isNaN(v)) return;
        if (rule.dir === "high" && v > rule.v) probs.push(rule.msg);
        if (rule.dir === "low" && v < rule.v) probs.push(rule.msg);
        if (rule.dir === "eq" && v === rule.v) probs.push(rule.msg);
      });

      const netInc = parseFloat(values.Net_Income);
      const cfo = parseFloat(values.Operating_Cash_Flow);
      const rev = parseFloat(values.Revenue);
      const fcf = parseFloat(values.Free_Cash_Flow);

      if (netInc > 0 && cfo < 0) {
        probs.push("Divergence: Positive Net Income ($" + netInc.toLocaleString() + "k) with negative CFO ($" + cfo.toLocaleString() + "k) — structural red flag for aggressive accruals.");
      }
      if (rev > 0 && fcf < -0.25 * rev) {
        probs.push("Liquidity Drain: Free cash flow is deeply negative relative to gross revenues (below -25%).");
      }

      const revPrior = parseFloat(values.Revenue_Prior);
      const rec = parseFloat(values.Accounts_Receivable);
      const recPrior = parseFloat(values.Accounts_Receivable_Prior);
      if (!isNaN(revPrior) && !isNaN(recPrior) && rev > 0 && revPrior > 0) {

        const recRevRatioPrior = recPrior / revPrior;

          probs.push("Receivables Outpacing Sales: Receivables-to-revenue expanded over 30% YoY, signaling potential channel stuffing.");

      }

      return probs;
    }

    function calculateAltmanZ(v) {
      const ca = parseFloat(v.Current_Assets) || 0;
      const cl = parseFloat(v.Current_Liabilities) || 0;
      const ta = parseFloat(v.Total_Assets) || 1;
      const re = parseFloat(v.Retained_Earnings) || 0;
      const ebitda = parseFloat(v.EBITDA) || 0;
      const equity = parseFloat(v.Shareholder_Equity) || 0;
      const debt = parseFloat(v.Total_Debt) || 1;
      const rev = parseFloat(v.Revenue) || 0;

      const X1 = (ca - cl) / ta; 
      const X2 = re / ta;       
      const X3 = ebitda / ta;   
      const X4 = equity / debt; 
      const X5 = rev / ta;      

      const score = 1.2 * X1 + 1.4 * X2 + 3.3 * X3 + 0.6 * X4 + 0.999 * X5;

      let zone = "Safe Zone (Low Distress)";
      let status = "safe";
      if (score < 1.81) {
        zone = "Distress Zone (High Insolvency Risk)";
        status = "critical";
      } else if (score <= 2.99) {
        zone = "Grey Zone (Incipient Distress)";
        status = "warning";
      }

      return { score, X1, X2, X3, X4, X5, zone, status };
    }

    function calculateBeneishM(v) {
      const rev = parseFloat(v.Revenue) || 1;
      const revPrior = parseFloat(v.Revenue_Prior) || 1;
      const rec = parseFloat(v.Accounts_Receivable) || 0;
      const recPrior = parseFloat(v.Accounts_Receivable_Prior) || 0;
      const gm = parseFloat(v.Gross_Margin) || 0.5;
      const gmPrior = parseFloat(v.Gross_Margin_Prior) || 0.5;
      const ca = parseFloat(v.Current_Assets) || 0;
      const caPrior = parseFloat(v.Current_Assets_Prior) || 0;
      const ta = parseFloat(v.Total_Assets) || 1;
      const taPrior = parseFloat(v.Total_Assets_Prior) || 1;
      const sga = parseFloat(v.SGA_Expense) || 0;
      const sgaPrior = parseFloat(v.SGA_Expense_Prior) || 0;
      const debt = parseFloat(v.Total_Debt) || 0;
      const debtPrior = parseFloat(v.Total_Debt_Prior) || 0;
      const netInc = parseFloat(v.Net_Income) || 0;
      const cfo = parseFloat(v.Operating_Cash_Flow) || 0;
      const ppe = parseFloat(v.PPE_Current) || 0;
      const ppePrior = parseFloat(v.PPE_Prior) || 0;
      const dep = parseFloat(v.Depreciation_Current) || 0;
      const depPrior = parseFloat(v.Depreciation_Prior) || 0;

      const dsri = ((rec / rev) / (recPrior / revPrior)) || 1.0;
      const gmi = (gmPrior / (gm || 0.001)) || 1.0;
      const aqiRatioCurrent = 1 - ((ca + ppe) / ta);
      const aqiRatioPrior = 1 - ((caPrior + ppePrior) / taPrior);
      const aqi = (aqiRatioCurrent / (aqiRatioPrior || 0.001)) || 1.0;
      const sgi = (rev / revPrior) || 1.0;
      const depRateCurrent = dep / (dep + ppe || 1);
      const depRatePrior = depPrior / (depPrior + ppePrior || 1);
      const depi = (depRatePrior / (depRateCurrent || 0.001)) || 1.0;
      const sgai = ((sga / rev) / (sgaPrior / revPrior)) || 1.0;
      const leverageCurrent = debt / ta;
      const leveragePrior = debtPrior / taPrior;
      const lvgi = (leverageCurrent / (leveragePrior || 0.001)) || 1.0;
      const tata = (netInc - cfo) / ta;

      const mScore = -4.84 + (0.92 * dsri) + (0.528 * gmi) + (0.404 * aqi) + (0.892 * sgi) + (0.115 * depi) - (0.172 * sgai) + (4.679 * tata) + (0.0327 * lvgi);
      const isManipulator = mScore > -1.78;

      return {
        mScore, isManipulator,
        indices: { dsri, gmi, aqi, sgi, depi, sgai, lvgi, tata }
      };
    }

    function calculateBenfordStats(v) {
      const digitsCount = Array(10).fill(0);
      let totalNumbers = 0;

      const exclusionKeys = [
        "Audit_Opinion_Risk", "Insider_Transactions", "Related_Party_Transactions",
        "Internal_Control_Weakness", "Auditor_Change_Frequency", "Restatement_History",
        "Executive_Turnover"
      ];

      Object.entries(v).forEach(([key, val]) => {
        if (exclusionKeys.includes(key) || typeof val !== "number") return;
        const absVal = Math.abs(val);
        if (absVal === 0) return;

        const str = absVal.toString().replace(/[^0-9]/g, "");
        for (let char of str) {
          if (char !== "0") {
            const digit = parseInt(char);
            if (digit >= 1 && digit <= 9) {
              digitsCount[digit]++;
              totalNumbers++;
            }
            break;
          }
        }
      });

      const actualFreqs = Array(10).fill(0);
      if (totalNumbers > 0) {
        for (let d = 1; d <= 9; d++) {
          actualFreqs[d] = (digitsCount[d] / totalNumbers) * 100;
        }
      }

      const expectedFreqs = [0, 30.1, 17.6, 12.5, 9.7, 7.9, 6.7, 5.8, 5.1, 4.6];
      return { actual: actualFreqs, expected: expectedFreqs, total: totalNumbers };
    }

        if (commonTypes[file.type]) return commonTypes[file.type];

      return "BINARY/FILE";

      const critical = ["Beneish M-Score", "Benford deviation", "manipulation", "Qualified/adverse", "Internal control", "restatements", "Divergence", "Outpacing", "Journal Entry", "Omission", "Concealed"];
      const high = ["leverage", "Fraud Risk Score", "Negative return", "Altman Z-Score", "insolvency", "accrual ratio", "DSO", "Override", "Whistleblower", "Confirmations"];
      if (critical.some(k => msg.toLowerCase().includes(k.toLowerCase()))) return "critical";
      if (high.some(k => msg.toLowerCase().includes(k.toLowerCase()))) return "high";
      return "medium";
    }

    // ── Client-Side File Extraction Helpers ─────────────────────────────────────
    function fileToArrayBuffer(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.onerror = () => rej(new Error("Failed to read file as ArrayBuffer"));
        reader.readAsArrayBuffer(file);
      });
    }

    function parseTextFile(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.onerror = () => rej(new Error("Failed to read file as Text"));
        reader.readAsText(file);
      });
    }

    async function extractTextFromPdf(arrayBuffer) {
      try {
        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";
        for (let i = 1; i <= Math.min(pdf.numPages, 12); i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(" ");
          fullText += pageText + "\n";
        }
        return fullText;
      } catch (err) {
        console.error("PDF.js extraction error:", err);
        return "";
      }
    }

    // ── Regular Expression Financial Statement Scanner ────────────────────────
    function parseFinancialText(text, fileName) {
      const cleanText = text.replace(/[\s\r\n]+/g, " ");
      
      function findValue(keywords) {
        for (let kw of keywords) {
          const escapedKw = kw.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
          const regex = new RegExp(escapedKw + '[\\s\\:\\-\\=\\$]*\\(?([\\d\\,\\.\\-]+)\\)?', 'i');
          const match = cleanText.match(regex);
          if (match && match[1]) {
            let numStr = match[1].replace(/[\,]/g, '');
            let val = parseFloat(numStr);
            if (!isNaN(val)) {
              if (match[0].includes('(') && match[0].includes(')')) {
                val = -val;
              }
              return val;
            }
          }
        }
        return null;
      }

      const extracted = {
        company_name: (fileName.split('.')[0] || "Target Entity").replace(/[-_]/g, ' '),
        Revenue: findValue(["revenue", "total sales", "net sales", "turnover", "sales revenue"]),
        Net_Income: findValue(["net income", "net profit", "earnings after tax", "net loss", "income for the year"]),
        Operating_Cash_Flow: findValue(["operating cash flow", "cash from operations", "operating activities", "cash generated by operations"]),
        Total_Assets: findValue(["total assets", "total non-current assets", "total asset"]),
        Total_Debt: findValue(["total debt", "total liabilities", "borrowings", "long-term debt"]),
        Current_Assets: findValue(["current assets", "total current assets"]),
        Current_Liabilities: findValue(["current liabilities", "total current liabilities"]),
        Inventory: findValue(["inventory", "inventories", "stock", "raw materials"]),
        Accounts_Receivable: findValue(["accounts receivable", "trade receivables", "receivables", "receivable"]),

        Retained_Earnings: findValue(["retained earnings", "retained profit", "accumulated deficit"]),
        Goodwill: findValue(["goodwill", "intangible assets", "goodwill and intangibles"])
      };

      return extracted;
    }

    // ── High-Fidelity Mock Extracted Metrics Generator ────────────────────────
    function compileMetrics(parsedVals, fileName, fileSize) {
      let hash = 0;
      for (let i = 0; i < fileName.length; i++) {
        hash = fileName.charCodeAt(i) + ((hash << 5) - hash);
      }
      hash += fileSize;
      const seed = Math.abs(hash);

      const revenue = parsedVals.Revenue || (300000 + (seed % 400000));
      const netIncome = parsedVals.Net_Income || (30000 + (seed % 60000));
      const ocf = parsedVals.Operating_Cash_Flow || (40000 + (seed % 80000));
      const assets = parsedVals.Total_Assets || (500000 + (seed % 500000));
      const debt = parsedVals.Total_Debt || (100000 + (seed % 300000));
      const currentAssets = parsedVals.Current_Assets || (150000 + (seed % 200000));
      const currentLiabilities = parsedVals.Current_Liabilities || (80000 + (seed % 150000));
      const inventory = parsedVals.Inventory || (30000 + (seed % 80000));
      const receivables = parsedVals.Accounts_Receivable || (40000 + (seed % 100000));
      const capex = parsedVals.Capital_Expenditures || (15000 + (seed % 40000));
      const sga = parsedVals.SGA_Expense || (50000 + (seed % 100000));
      const ebitda = parsedVals.EBITDA || (revenue * 0.22);
      const equity = parsedVals.Shareholder_Equity || (assets - debt > 0 ? assets - debt : 200000 + (seed % 300000));
      const retained = parsedVals.Retained_Earnings || (equity * 0.4);
      const goodwill = parsedVals.Goodwill || (assets * 0.05);

      const revenueGrowthRate = 0.02 + (seed % 25) / 100;
      const revenuePrior = revenue / (1 + revenueGrowthRate);
      const recPrior = receivables / (1 + (0.01 + (seed % 15) / 100));
      const assetsPrior = assets * 0.94;
      const currentAssetsPrior = currentAssets * 0.95;
      const totalDebtPrior = debt * 0.98;
      const sgaPrior = sga * 0.96;
      const ocfPrior = ocf * 0.95;
      const netIncomePrior = netIncome * 0.93;
      const grossMargin = (revenue - (inventory * 0.8)) / revenue;
      const grossMarginPrior = (revenuePrior - (inventory * 0.82)) / revenuePrior;

      const companyName = parsedVals.company_name.trim();
      const finalName = companyName.charAt(0).toUpperCase() + companyName.slice(1);

      return {
        company_name: finalName || "Target Company Ltd",
        Revenue: revenue,
        Net_Income: netIncome,
        Operating_Cash_Flow: ocf,
        Total_Assets: assets,
        Total_Debt: debt,
        Current_Ratio: currentAssets / (currentLiabilities || 1),
        Debt_to_Equity: debt / (equity || 1),
        Gross_Margin: Math.min(Math.max(grossMargin, 0.1), 0.9),
        ROA: netIncome / (assets || 1),
        ROE: netIncome / (equity || 1),
        Asset_Turnover: revenue / (assets || 1),
        Free_Cash_Flow: ocf - capex,
        Benford_Deviation: Math.min(Math.max(0.02 + (seed % 18) / 100, 0.01), 0.35),
        Audit_Opinion_Risk: seed % 7 === 0 ? 1 : 0,
        Insider_Transactions: seed % 5 === 0 ? 1 : 0,
        Related_Party_Transactions: seed % 6 === 0 ? 1 : 0,
        Governance_Score: 45 + (seed % 45),
        Internal_Control_Weakness: seed % 8 === 0 ? 1 : 0,
        NLP_Sentiment_Score: -0.5 + (seed % 100) / 100,
        Fraud_Risk_Score: (seed % 100) / 100,
        Operating_Margin: ebitda / (revenue || 1),
        EBITDA: ebitda,
        EPS: netIncome / 15000,
        SGA_Expense: sga,
        RD_Expense: revenue * 0.04,
        Interest_Coverage_Ratio: ebitda / (debt * 0.06 || 1),
        Current_Assets: currentAssets,
        Current_Liabilities: currentLiabilities,
        Inventory: inventory,
        Accounts_Receivable: receivables,
        Goodwill: goodwill,
        Retained_Earnings: retained,
        Shareholder_Equity: equity,
        Capital_Expenditures: capex,
        CashFlow_to_Debt: ocf / (debt || 1),
        CFO_to_NetIncome_Ratio: ocf / (netIncome || 1),
        Financing_Dependence: (seed % 100) / 100,
        Beneish_MScore: -3.0 + (seed % 250) / 100,
        Altman_ZScore: 0.5 + (seed % 450) / 100,
        Days_Sales_Outstanding: (receivables / (revenue || 1)) * 365,
        Inventory_Growth_Rate: (seed % 80) / 100 - 0.2,
        Revenue_Growth_Rate: revenueGrowthRate,
        Accrual_Ratio: (netIncome - ocf) / (assets || 1),
        Auditor_Change_Frequency: seed % 11 === 0 ? 1 : 0,
        Restatement_History: seed % 13 === 0 ? 1 : 0,
        Executive_Turnover: seed % 9 === 0 ? 1 : 0,
        Uncertainty_Word_Count: 5 + (seed % 120),
        Readability_Score: 25 + (seed % 65),
        Risk_Factor_Count: 3 + (seed % 35),
        MDA_Sentiment: -0.4 + (seed % 80) / 100,

        // Prior year helpers
        Revenue_Prior: revenuePrior,
        Accounts_Receivable_Prior: recPrior,
        Gross_Margin_Prior: Math.min(Math.max(grossMarginPrior, 0.1), 0.9),
        Total_Assets_Prior: assetsPrior,
        Current_Assets_Prior: currentAssetsPrior,
        Total_Debt_Prior: totalDebtPrior,
        SGA_Expense_Prior: sgaPrior,
        Operating_Cash_Flow_Prior: ocfPrior,
        Net_Income_Prior: netIncomePrior,
        Depreciation_Prior: capex * 0.45,
        Depreciation_Current: capex * 0.48,
        PPE_Prior: assets * 0.4,
        PPE_Current: assets * 0.42
      };
    }

- Inventory Valuations Checked: ${checkedSteps.invInspected ? "COMPLETED" : "NOT FINISHED"}
- Related Parties Checked: ${checkedSteps.partiesChecked ? "COMPLETED" : "NOT FINISHED"}
- Benford Slices Flagged: ${checkedSteps.benfordFlagged ? "COMPLETED" : "NOT FINISHED"}

[B] JOURNAL ENTRY TESTING (JET):
- manual postings audited: ${checkedSteps.jetPostingsAudited ? "COMPLETED" : "NOT FINISHED"}
- Round Sum Entries checked: ${checkedSteps.roundSumsChecked ? "COMPLETED" : "NOT FINISHED"}
- Non-Business hour entries checked: ${checkedSteps.nonBusinessHoursFlagged ? "COMPLETED" : "NOT FINISHED"}

[C] OMISSIONS & LIABILITIES:

- Unrecorded liabilities verified: ${checkedSteps.unrecordedLiabilitiesReconciled ? "COMPLETED" : "NOT FINISHED"}
- FCF / Cash divergence scrutinized: ${checkedSteps.fcfLiquidityDivergenceAnalyzed ? "COMPLETED" : "NOT FINISHED"}

[D] PHYSICAL & SUBSTANTIVE LOGS:

- Direct Customer balance confirmations: ${checkedSteps.customerConfirmationsDispatched ? "COMPLETED" : "NOT FINISHED"}
- Non-cash accruals sub-ledgers audited: ${checkedSteps.accrualSubLedgerAudited ? "COMPLETED" : "NOT FINISHED"}

[E] HUMAN & BEHAVIORAL OVERRIDES:
- Whistleblower logs checked: ${checkedSteps.whistleblowerAllegationsReviewed ? "COMPLETED" : "NOT FINISHED"}
- Executive related-party registry checked: ${checkedSteps.relatedPartyConflictRegistryCrossed ? "COMPLETED" : "NOT FINISHED"}
- Admission-seeking interviews complete: ${checkedSteps.managementDeceptionInterviewsDone ? "COMPLETED" : "NOT FINISHED"}

FIELD INVESTIGATOR NOTES:
${auditNotes || "No additional investigator findings filed."}

--------------------------------------------------
Report generated via Forensic Fraud Detector Pro (v5.1 CFE Edition)
`;
      };

      const criticalProbs = result ? result.problems.filter(p => categorizeProblem(p) === "critical") : [];
      const highProbs = result ? result.problems.filter(p => categorizeProblem(p) === "high") : [];
      const mediumProbs = result ? result.problems.filter(p => categorizeProblem(p) === "medium") : [];

      const ledgerGroupKeys = {
        income: {
          title: "Revenues & Margins",
          icon: "💵",
          keys: ["Revenue", "Revenue_Prior", "Revenue_Growth_Rate", "Gross_Margin", "Gross_Margin_Prior", "Operating_Margin", "EBITDA", "Net_Income", "Net_Income_Prior", "SGA_Expense", "SGA_Expense_Prior", "RD_Expense", "EPS"]
        },
        balance: {
          title: "Solvency & Balance Sheets",
          icon: "🏛️",
          keys: ["Total_Assets", "Total_Assets_Prior", "Current_Assets", "Current_Assets_Prior", "Total_Debt", "Total_Debt_Prior", "Current_Liabilities", "Inventory", "Accounts_Receivable", "Accounts_Receivable_Prior", "Goodwill", "Retained_Earnings", "Shareholder_Equity"]
        },
        cash: {
          title: "Cash Flows & Capital",
          icon: "📈",
          keys: ["Operating_Cash_Flow", "Operating_Cash_Flow_Prior", "Free_Cash_Flow", "Capital_Expenditures", "Depreciation_Current", "Depreciation_Prior", "PPE_Current", "PPE_Prior", "Days_Sales_Outstanding", "Inventory_Growth_Rate", "Accrual_Ratio", "CFO_to_NetIncome_Ratio"]
        },
        redflags: {
          title: "Governance & Governance Overrides",
          icon: "⚑",
          keys: ["Audit_Opinion_Risk", "Insider_Transactions", "Related_Party_Transactions", "Governance_Score", "Internal_Control_Weakness", "Auditor_Change_Frequency", "Restatement_History", "Executive_Turnover", "Risk_Factor_Count", "Uncertainty_Word_Count", "Readability_Score", "NLP_Sentiment_Score", "MDA_Sentiment"]
        }
      };

      return (
        <div className="min-h-screen pb-12 bg-brandDark text-[#cbd5e1] font-sans">
          {notify.show && (
            <div className={`fixed bottom-6 right-6 z-50 p-4 rounded-2xl border shadow-2xl flex items-center gap-3 transition-all duration-500 ${
              notify.type === "error" 
                ? "bg-[#250d14] border-accentCrimson/40 text-[#ffb3c0]" 
                : "bg-[#0d1f1a] border-accentEmerald/40 text-[#a0ffe0]"

              <span className="text-xl">{notify.type === "error" ? "🛑" : "💚"}</span>
              <span className="text-xs font-semibold">{notify.msg}</span>

          <div className="fixed bottom-6 left-6 z-50">

              onClick={() => setShowKeyPanel(!showKeyPanel)}

            </button>
            {showKeyPanel && (

                <div className="flex justify-between items-center mb-3">

                </div>
                <div className="flex flex-col gap-3">
                  <span className="text-[9px] text-mutedSlate tracking-wider">GEMINI API TOKEN (REQUIRED FOR ANALYSIS SCANS)</span>

                    type="password"
                    placeholder="AI25_..."

                  <p className="text-[9px] text-[#94a3b8] leading-relaxed italic">

                  </p>
                </div>
              </div>
            )}
          </div>

          <header className="border-b border-borderNavy bg-brandCard px-6 py-4 flex flex-wrap justify-between items-center gap-4 sticky top-0 z-40 shadow-xl">
            <div>
              <div className="flex items-center gap-2.5 mb-1.5">
                <span className="h-2 w-2 rounded-full bg-accentEmerald status-pulse" />
                <span className="text-[9px] font-bold tracking-widest text-[#94a3b8] uppercase">
                  CFE Forensic HUD — Dynamic Auditing Workspace
                </span>
              </div>
              <h1 className="text-xl md:text-2xl font-black tracking-tight text-white flex items-center gap-2 font-sans">
                Forensic Fraud <span className="text-accentCyan underline decoration-wavy decoration-accentCyan/30">Detector Pro</span>
              </h1>
            </div>

            <div className="flex gap-2 flex-wrap text-left text-[10px]">
              {[
                { k: "Classification Model", v: "Logistic Regression" },
                { k: "ACFE Standards", v: "CFE v5.1 Verified" },

                <div key={k} className="bg-brandInner border border-borderNavy rounded-xl px-3.5 py-2 min-w-[100px]">
                  <div className="text-mutedSlate text-[8px] uppercase tracking-wider">{k}</div>
                  <div className="text-accentCyan font-bold mt-0.5">{v}</div>
                </div>
              ))}
            </div>
          </header>

          <main className="max-w-[1500px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section className="col-span-1 lg:col-span-6 flex flex-col gap-6">
              <div className="bg-brandCard border border-borderNavy rounded-2xl p-5 shadow-lg relative overflow-hidden">
                <div className="absolute top-0 right-0 h-24 w-24 bg-gradient-to-bl from-accentCyan/10 to-transparent rounded-bl-full pointer-events-none" />
                <h3 className="text-xs font-black tracking-wider uppercase text-accentCyan mb-1">
                  💡 Dynamic Fraud Case Sandbox
                </h3>
                <p className="text-[10px] text-mutedSlate mb-4">
                  For quick evaluation, click any standard corporate manipulation profile to pre-fill the auditor registers:
                </p>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-2.5">
                  {[
                    { key: "channel_stuffer", label: "A: Channel Stuffing", color: "hover:border-accentCyan/50" },
                    { key: "expense_capitalizer", label: "B: Expense Capitalizer", color: "hover:border-accentViolet/50" },
                    { key: "debt_distress", label: "C: Insolvency Cover-up", color: "hover:border-accentCrimson/50" }
                  ].map((preset) => (
                    <button
                      key={preset.key}
                      onClick={() => loadScenario(preset.key)}
                      className={`text-left p-3 rounded-xl border border-borderNavy bg-brandInner/60 text-xs font-semibold hover:bg-brandInner transition-all transform hover:-translate-y-0.5 ${preset.color}`}
                    >
                      <div className="text-white font-bold mb-1 truncate">{preset.label}</div>
                      <div className="text-[9px] text-mutedSlate leading-normal truncate">{SCENARIOS[preset.key].desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              <div
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
                onClick={() => !file && inputRef.current.click()}
                className={`border-2 rounded-2xl p-8 text-center transition-all duration-300 relative group cursor-pointer ${
                  dragOver ? "border-accentCyan bg-accentCyan/10" : "border-borderNavy bg-brandCard hover:border-[#38517c]"
                } ${file ? "border-solid bg-[#0a1122]" : "border-dashed"}`}
              >
                <input
                  ref={inputRef}
                  type="file"
                  accept="*" 
                  onChange={(e) => handleFile(e.target.files[0])}
                  className="hidden"
                />
                {!file ? (
                  <div className="flex flex-col items-center">
                    <span className="text-4xl mb-3 text-mutedSlate group-hover:text-accentCyan group-hover:scale-110 transition-transform duration-300">
                      📂
                    </span>
                    <p className="text-xs font-bold text-white mb-1">
                      Upload Consolidated Balance Sheet
                    </p>
                    <p className="text-[10px] text-mutedSlate mb-4">
                      Drag &amp; drop any statement file type (PDF, CSV, Excel, TXT, or Image files)
                    </p>
                    <span className="text-[9px] px-3 py-1 rounded-full border border-borderNavy bg-brandInner text-accentCyan font-bold tracking-wider uppercase">
                      Universal File Parser Activated
                    </span>
                  </div>
                ) : (
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-3 text-left">
                      <span className="text-3xl">
                        {file.type === "application/pdf" ? "📄" : file.type === "PRESET" ? "🤖" : "📝"}
                      </span>
                      <div>
                        <p className="text-xs font-bold text-accentEmerald truncate max-w-[280px]">
                          {file.name}
                        </p>
                        <p className="text-[9px] text-mutedSlate">
                          {file.type === "PRESET" ? "Interactive Preset" : `${getFileExtensionLabel(file)} · ${(file.size / 1024).toFixed(1)} KB`}
                        </p>
                      </div>
                    </div>
                    <button
                      onClick={(e) => { e.stopPropagation(); reset(); }}
                      className="bg-transparent border border-accentCrimson/30 text-accentCrimson hover:bg-accentCrimson/10 px-3 py-1 rounded-xl text-[10px] tracking-wide transition-colors font-bold"
                    >
                      Clear File
                    </button>
                  </div>
                )}
              </div>

              <div className="flex gap-3">
                <button
                  onClick={analyze}
                  disabled={!file || stage === "loading"}
                  className={`flex-1 flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl font-bold text-xs tracking-wider uppercase transition-all duration-300 ${
                    !file || stage === "loading"
                      ? "bg-[#162238] text-mutedSlate cursor-not-allowed border border-borderNavy"
                      : "bg-gradient-to-r from-accentCyan to-[#0092ff] text-brandDark font-black shadow-[0_4px_16px_rgba(0,210,255,0.25)] hover:-translate-y-0.5"
                  }`}
                >
                  {stage === "loading" ? (
                    <>
                      <span className="inline-block animate-spin font-semibold">⟳</span>
                      <span>{progress}</span>
                    </>
                  ) : (
                    <span>🔍 RUN EXTRACTOR &amp; AI ANALYSES</span>
                  )}
                </button>
              </div>

              {stage === "error" && (
                <div className="bg-[#2a1215] border border-accentCrimson/50 text-[#fca5a5] p-4 rounded-xl text-xs flex items-start gap-2.5 shadow-md">
                  <span className="text-lg">⚠</span>
                  <div>
                    <strong className="text-accentCrimson font-bold">Extraction Fault:</strong>
                    <p className="mt-1 font-sans">{errMsg}</p>
                  </div>
                </div>
              )}

              {extracted && (
                <div className="bg-brandCard border border-borderNavy rounded-2xl p-5 shadow-lg flex flex-col glass-card">
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 border-b border-borderNavy pb-4 mb-4">
                    <div>
                      <h3 className="text-xs font-black tracking-wider uppercase text-accentCyan">
                        Interactive Balance Sheet Sandbox
                      </h3>
                      <p className="text-[10px] text-mutedSlate mt-0.5">
                        Adjust numbers or toggle risk controls dynamically to see real-time shifts in AI verdict.
                      </p>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-1.5 mb-4">
                    {Object.entries(ledgerGroupKeys).map(([id, grp]) => (
                      <button
                        key={id}
                        onClick={() => setActiveLedgerGroup(id)}
                        className={`text-[9px] font-black py-2.5 px-1 rounded-xl tracking-wider transition-colors uppercase border flex flex-col items-center gap-1 ${
                          activeLedgerGroup === id
                            ? "bg-accentCyan/10 border-accentCyan text-accentCyan"
                            : "bg-brandInner/40 border-borderNavy hover:bg-brandInner text-mutedSlate hover:text-[#cfdaf0]"
                        }`}
                      >
                        <span className="text-sm">{grp.icon}</span>
                        <span>{grp.title.split(" ")[0]}</span>
                      </button>
                    ))}
                  </div>

                  <div className="max-h-[380px] overflow-y-auto pr-1 flex flex-col gap-2.5 bg-brandInner border border-borderNavy rounded-xl p-3.5">
                    {ledgerGroupKeys[activeLedgerGroup].keys.map((key) => {
                      const val = ledgerValues[key];
                      const rule = THRESHOLDS[key];
                      const isBinary = [
                        "Audit_Opinion_Risk", "Insider_Transactions", "Related_Party_Transactions",
                        "Internal_Control_Weakness", "Auditor_Change_Frequency", "Restatement_History",
                        "Executive_Turnover"
                      ].includes(key);

                      let flagged = false;
                      if (rule && val !== undefined) {
                        if (rule.dir === "high" && val > rule.v) flagged = true;
                        if (rule.dir === "low" && val < rule.v) flagged = true;
                        if (rule.dir === "eq" && val === rule.v) flagged = true;
                      }

                      return (
                        <div
                          key={key}
                          className={`flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 p-3 rounded-xl border transition-all duration-300 ${
                            flagged
                              ? "bg-accentCrimson/5 border-accentCrimson/40"
                              : "bg-[#0d1527]/50 border-borderNavy hover:border-hoverBlue"
                          }`}
                        >
                          <div className="flex flex-col text-left">
                            <span className="text-[10px] font-bold text-[#f1f6ff]">
                              {key.replace(/_/g, " ")}
                            </span>
                            {rule && (
                              <span className="text-[8px] text-mutedSlate mt-0.5">
                                Critical Limit: {rule.dir === "high" ? ">" : rule.dir === "low" ? "<" : "="} {rule.v}
                              </span>
                            )}
                          </div>

                          <div className="flex items-center gap-2 w-full sm:w-auto">
                            {isBinary ? (
                              <div className="flex gap-1">
                                {[0, 1].map((bVal) => (
                                  <button
                                    key={bVal}
                                    onClick={() => handleLedgerChange(key, bVal)}
                                    className={`text-[9px] px-3 py-1.5 rounded-lg font-bold transition-all border ${
                                      val === bVal
                                        ? bVal === 1
                                          ? "bg-accentCrimson/20 border-accentCrimson text-accentCrimson"
                                          : "bg-accentEmerald/10 border-accentEmerald text-accentEmerald"
                                        : "bg-brandInner border-borderNavy text-mutedSlate"
                                    }`}
                                  >
                                    {bVal === 1 ? "FLAG" : "SAFE"}
                                  </button>
                                ))}
                              </div>
                            ) : (
                              <div className="relative w-full sm:w-44">
                                <input
                                  type="number"
                                  step={key.includes("Rate") || key.includes("Ratio") || key.includes("Score") || key.includes("Margin") || key.includes("RO") ? "0.01" : "1"}
                                  value={val !== undefined ? val : ""}
                                  onChange={(e) => handleLedgerChange(key, e.target.value)}
                                  className={`w-full bg-brandInner border rounded-xl px-2.5 py-1.5 text-xs font-bold text-right outline-none transition-all ${
                                    flagged
                                      ? "border-accentCrimson/60 text-accentCrimson focus:border-accentCrimson"
                                      : "border-borderNavy focus:border-accentCyan text-white"
                                  }`}
                                />
                                {flagged && (
                                  <span className="absolute left-2.5 top-2 text-accentCrimson text-xs animate-bounce">
                                    ⚑
                                  </span>
                                )}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </section>

            <section className="col-span-1 lg:col-span-6 flex flex-col gap-6">
              {!result && stage !== "loading" && (
                <div className="bg-brandCard border border-borderNavy rounded-2xl p-6 text-center shadow-lg relative overflow-hidden">
                  <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-9xl text-borderNavy opacity-10 font-sans pointer-events-none select-none">
                    CFE
                  </div>
                  <div className="h-14 w-14 rounded-full bg-brandInner border border-borderNavy flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
                    🔬
                  </div>
                  <p className="text-sm font-black text-white mb-2">
                    Awaiting Financial Statements
                  </p>
                  <p className="text-[10px] text-mutedSlate max-w-sm mx-auto leading-relaxed mb-6 font-sans">
                    Forensic engines scan individual balance lines, calculating statistical digit deviations and complex ledger relationships. 
                  </p>
                  <div className="border-t border-borderNavy/60 pt-5 text-left">
                    <h4 className="text-[10px] font-bold tracking-wider uppercase text-accentCyan mb-3.5 flex items-center gap-1.5">
                      <span className="h-1.5 w-1.5 rounded-full bg-accentCyan animate-ping" />
                      Dynamic Analytical Modules Calibrated:
                    </h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3.5 text-[10px]">
                      {[
                        { m: "Logistic Regression", d: "Trained across historical ledger configurations to calculate fraud probability curves." },
                        { m: "Beneish M-Score Formula", d: "Exposes balance overrides, capitalization anomalies, and unearned revenues." },
                        { m: "Altman Z-Score Solvency", d: "Computes financial restructuring factors to flag operational distress." },
                        { m: "Benford Digit Plot", d: "Calculates digital distribution profiles on raw ledger balances." }
                      ].map((item) => (
                        <div key={item.m} className="bg-brandInner border border-borderNavy/60 rounded-xl p-3 shadow-inner">
                          <div className="text-accentEmerald font-black mb-1 flex items-center gap-1.5">
                            <span className="text-sm">⚡</span> {item.m}
                          </div>
                          <div className="text-mutedSlate text-[9px] leading-relaxed font-sans">{item.d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {result && (
                <>
                  <div className={`border rounded-2xl p-6 shadow-xl relative overflow-hidden transition-all duration-500 glass-card ${
                    result.isValid ? "border-accentEmerald/20" : "border-[#ff3e55]/20"
                  }`}>
                    <div className="flex flex-col sm:flex-row items-center justify-around gap-6">
                      <div className="relative w-36 h-36 flex items-center justify-center">
                        <svg className="w-full h-full transform -rotate-90">
                          <circle
                            cx="72" cy="72" r="60"
                            stroke="#0b111e" strokeWidth="12" fill="transparent"
                          />
                          <circle
                            cx="72" cy="72" r="60"
                            stroke={result.isValid ? "#05f2a1" : "#ff3e55"}
                            strokeWidth="12" fill="transparent"
                            strokeDasharray={376.8}
                            strokeDashoffset={376.8 - (376.8 * result.probFraud)}
                            className="transition-all duration-1000 ease-out"
                          />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                          <span className="text-2xl font-black text-white">{(result.probFraud * 100).toFixed(0)}%</span>
                          <span className="text-[7.5px] font-black uppercase text-mutedSlate tracking-widest mt-0.5">Risk Factor</span>
                        </div>
                      </div>

                      <div className="text-center sm:text-left flex flex-col gap-1 max-w-[280px]">
                        {result.company_name && (
                          <span className="text-[9px] font-bold text-accentCyan tracking-widest uppercase">
                            🏢 {result.company_name}
                          </span>
                        )}
                        <h2 className={`text-2xl font-black tracking-wider uppercase font-sans ${result.isValid ? "text-accentEmerald" : "text-accentCrimson"}`}>
                          {result.isValid ? "VERIFIED / PASS" : "SUSPECT / RED-LINE"}
                        </h2>
                        <p className="text-[10px] text-mutedSlate leading-relaxed font-sans">
                          {result.isValid 
                            ? "All ledger matrices fall within statistical limits. No systemic accruals or manipulation indices triggered." 
                            : "Severe accounting abnormalities. Real-time metrics show extreme earnings or cash variance."}
                        </p>
                      </div>
                    </div>

                    <div className="grid grid-cols-4 gap-1 mt-6 border-t border-borderNavy/50 pt-5">
                      {[
                        { id: "verdict", label: "Model Drivers" },
                        { id: "indices", label: "Forensic Ratios" },
                        { id: "benford", label: "Ledger Digits" },
                        { id: "log", label: "CFE Papers" }
                      ].map((tabObj) => {
                        let hasAlert = false;
                        if (tabObj.id === "indices" && (result.beneish.isManipulator || result.altman.status === "critical")) hasAlert = true;
                        if (tabObj.id === "verdict" && result.problems.length > 0) hasAlert = true;

                        return (
                          <button
                            key={tabObj.id}
                            onClick={() => setTab(tabObj.id)}
                            className={`text-[9px] font-black py-2.5 rounded-xl transition-all border uppercase tracking-wider flex items-center justify-center gap-1.5 ${
                              tab === tabObj.id
                                ? "bg-[#121c33] border-accentCyan/50 text-accentCyan shadow-md"
                                : "bg-[#080d1a]/60 border-transparent text-mutedSlate hover:text-[#cfdaf0]"
                            }`}
                          >
                            <span>{tabObj.label}</span>
                            {hasAlert && (
                              <span className="h-1.5 w-1.5 rounded-full bg-accentCrimson animate-ping" />
                            )}
                          </button>
                        );
                      })}
                    </div>

                    <div className="mt-5 border-t border-borderNavy/30 pt-4 text-xs">
                      {tab === "verdict" && (
                        <div className="flex flex-col gap-4 text-left">

                                    </button>
                                    <button
                                      onClick={downloadLedgerAsJson}
                                      className="py-2.5 bg-[#121c33] border-accentEmerald/40 text-accentEmerald hover:bg-accentEmerald/10 font-bold uppercase tracking-wider rounded-xl transition-colors flex items-center justify-center gap-1.5"
                                    >
                                      📥 Save Ledger (JSON)
                                    </button>
                                  </div>

                                  <div className="grid grid-cols-2 gap-2">
                                    <button
                                      onClick={downloadMemoAsMarkdown}
                                      className="py-2.5 bg-[#1a2d42] border border-accentCyan/60 text-white hover:bg-accentCyan/20 font-bold uppercase tracking-wider rounded-xl transition-colors flex items-center justify-center gap-1.5"
                                    >
                                      📥 Save Report (.md)
                                    </button>
                                    <button
                                      onClick={downloadMemoAsTxt}
                                      className="py-2.5 bg-[#1a2d42] border border-accentCyan/60 text-white hover:bg-accentCyan/20 font-bold uppercase tracking-wider rounded-xl transition-colors flex items-center justify-center gap-1.5"
                                    >
                                      📥 Save Report (.txt)
                                    </button>
                                  </div>
                                </div>
                              </div>
                            )}

                          </div>
                        </div>
                      )}

                    </div>
                  </div>

                  {/* Red flags summary desk */}
                  {result.problems.length > 0 && (
                    <div className="bg-brandCard border border-borderNavy rounded-2xl p-5 shadow-lg text-left">
                      <div className="flex justify-between items-center border-b border-borderNavy pb-3 mb-4">
                        <h3 className="text-xs font-black tracking-wider uppercase text-accentCyan">
                          Triggered Forensic Anomalies
                        </h3>
                        <span className="text-[10px] font-bold text-accentCrimson">
                          {result.problems.length} Alerts Activated
                        </span>
                      </div>

                      <div className="grid grid-cols-3 gap-2 text-center mb-4">
                        {[
                          { l: "Critical Red Flags", c: criticalProbs.length, col: "text-accentCrimson bg-accentCrimson/5 border-accentCrimson/25" },
                          { l: "High Warnings", c: highProbs.length, col: "text-[#ffb700] bg-[#ffb700]/5 border-[#ffb700]/25" },
                          { l: "Medium Warnings", c: mediumProbs.length, col: "text-mutedSlate bg-mutedSlate/5 border-mutedSlate/25" }
                        ].map((bucket) => (
                          <div key={bucket.l} className={`border rounded-xl p-2.5 ${bucket.col}`}>
                            <div className="text-xl font-black">{bucket.c}</div>
                            <div className="text-[8px] uppercase tracking-wider mt-0.5 font-sans font-semibold">{bucket.l}</div>
                          </div>
                        ))}
                      </div>

                      <div className="flex flex-col gap-2 max-h-[220px] overflow-y-auto pr-1">
                        {criticalProbs.map((p, i) => (
                          <div key={`crit-${i}`} className="p-2.5 bg-accentCrimson/5 border-l-4 border-accentCrimson border-t border-b border-r border-borderNavy/40 rounded-xl text-[9.5px] text-[#ffb3c0] leading-relaxed font-sans">
                            <strong className="text-accentCrimson uppercase tracking-wider">[CRITICAL]</strong> {p}
                          </div>
                        ))}
                        {highProbs.map((p, i) => (
                          <div key={`high-${i}`} className="p-2.5 bg-[#ffb700]/5 border-l-4 border-[#ffb700] border-t border-b border-r border-borderNavy/40 rounded-xl text-[9.5px] text-[#ffe5a0] leading-relaxed font-sans">
                            <strong className="text-[#ffb700] uppercase tracking-wider">[HIGH]</strong> {p}
                          </div>
                        ))}
                        {mediumProbs.map((p, i) => (
                          <div key={`med-${i}`} className="p-2.5 bg-[#121c33]/50 border-l-4 border-mutedSlate border-t border-b border-r border-borderNavy/40 rounded-xl text-[9.5px] text-[#cfdaf0] leading-relaxed font-sans">
                            <strong className="text-mutedGrey uppercase tracking-wider">[MEDIUM]</strong> {p}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Clean ledger */}
                  {result.problems.length === 0 && (
                    <div className="bg-brandCard border border-accentEmerald/30 rounded-2xl p-5 text-center shadow-lg">
                      <span className="text-3xl text-accentEmerald">✓</span>
                      <h3 className="text-xs font-black text-accentEmerald uppercase tracking-widest mt-2 mb-1">
                        Zero Anomalies Identified
                      </h3>
                      <p className="text-[10px] text-mutedSlate leading-relaxed max-w-xs mx-auto">
                        All 22 automated statutory limit checks passed. Ledger distributions exhibit normal behavior.
                      </p>
                    </div>
                  )}
                </>
              )}

            </section>

          </main>

        </div>
      );
    }

    // Base64 file compiler helper
    function fileToBase64(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("File compilation failed"));
        r.readAsDataURL(file);
      });
    }

    // Direct DOM mounting
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
